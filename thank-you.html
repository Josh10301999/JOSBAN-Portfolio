<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Joshua Bañacia</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
        }

        .thank-you-box {
            max-width: 600px;
            text-align: center;
            padding: 50px;
            background: #111;
            border: 1px solid #222;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 0, 0, .15);
        }

        .checkmark {
            width: 90px;
            height: 90px;
            margin: auto;
            background: #dc3545;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            color: white;
            margin-bottom: 25px;
        }

        h1 {
            font-weight: bold;
            margin-bottom: 15px;
        }

        p {
            color: #bbb;
            font-size: 18px;
            margin-bottom: 35px;
        }

        .btn-home {
            background: #dc3545;
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            transition: .3s;
            font-weight: 600;
        }

        .btn-home:hover {
            background: #bb2d3b;
            color: white;
        }
    </style>
</head>

<body>

<div class="thank-you-box">

    <div class="checkmark">
        ✓
    </div>

    <h1>Thank You!</h1>

    <p>
        Your message has been sent successfully.<br>
        Thank you for reaching out. I'll review your message and get back to you as soon as possible.
    </p>

    <a href="index.html" class="btn-home">
        ← Back to Portfolio
    </a>

</div>

</body>
</html>
